  <!-- Arm + book -->
  <rect x="70" y="72" width="9" height="30" rx="3" fill="#1A2B4A"/>
  <rect x="75" y="92" width="20" height="15" fill="#FFD93D" stroke="#1A2B4A" stroke-width="2"/>
  <line x1="85" y1="92" x2="85" y2="107" stroke="#1A2B4A" stroke-width="1.5"/>
  <!-- Legs -->
  <rect x="43" y="124" width="13" height="50" rx="4" fill="#1A2B4A"/>
  <rect x="61" y="124" width="13" height="50" rx="4" fill="#1A2B4A"/>
</svg>
